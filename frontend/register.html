<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="register.js" defer></script>
    <link rel="stylesheet" href="register.css">
    <title>Register</title>
</head>
<body>
    <form id="registerForm">

    <input
        type="text"
        id="username"
        placeholder="Usuário"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Senha"
        required
    >

    <button type="submit">
        Criar Conta
    </button>

</form>
<p id="message"></p>
</body>
</html>
